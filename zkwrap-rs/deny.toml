# cargo-deny configuration for the zkwrap-rs workspace.
# Run locally with:  cargo deny --manifest-path zkwrap-rs/Cargo.toml check
# Enforced in CI by .github/workflows/security.yml.

[graph]
all-features = true

[advisories]
# RustSec advisory DB. Unmaintained/vulnerable/yanked crates fail the check.
version = 2
yanked = "deny"
# Add advisory IDs here only with a justification comment if a fix is unavailable.
#
# Each entry is a transitive dependency of arkworks (ark-groth16 / ark-relations /
# ark-ff), pulled in for Groth16 verification. All three are already fixed in
# arkworks 0.6 (paste/derivative dropped, tracing-subscriber bumped to 0.3), but
# we cannot adopt 0.6: risc0-groth16 pins `ark-groth16 = "^0.5"` — true even of
# its latest release (5.0.0-rc.1) — so Cargo is locked to the arkworks 0.5.x line,
# whose newest releases still carry these crates. Exit condition is therefore a
# risc0-groth16 release that migrates to arkworks 0.6.
ignore = [
    # tracing-subscriber 0.2.x: ANSI log poisoning. Pulled by ark-relations's
    # `std` feature. We do not feed untrusted input through this logger.
    "RUSTSEC-2025-0055",
    # derivative: unmaintained (no vulnerability). Pulled by ark-crypto-primitives.
    "RUSTSEC-2024-0388",
    # paste: unmaintained (no vulnerability). Pulled by ark-ff.
    "RUSTSEC-2024-0436",
]

[licenses]
version = 2
# Permissive licenses acceptable for a verifier we expect downstreams to embed.
# Extend deliberately — a new copyleft entry is a decision worth reviewing.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
# Duplicate versions are noise, not errors, in a young tree — surface, don't block.
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
