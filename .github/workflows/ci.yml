name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. force-pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zkwrap-rs
    steps:
      - uses: actions/checkout@v7
      # Channel + components come from zkwrap-rs/rust-toolchain.toml; rustup
      # installs them on first use. `rustup show` makes that explicit and early.
      - name: Install pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: zkwrap-rs
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Build
        run: cargo build --locked --workspace
      - name: Test
        run: cargo test --locked --workspace

  go:
    name: Go (gofmt, vet, test -short)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zkwrap-gnark
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: zkwrap-gnark/go.mod
          cache-dependency-path: zkwrap-gnark/go.sum
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$unformatted"
            exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      # -short skips the slow trusted-setup/prove/verify tests; the full suite
      # runs nightly (.github/workflows/nightly.yml).
      - name: Test (short)
        run: go test -short ./...
