version: 2
updates:
  # Rust workspace. arkworks crates are version-locked siblings, so group them
  # into one PR instead of N racing PRs.
  - package-ecosystem: cargo
    directory: /zkwrap-rs
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      arkworks:
        patterns:
          - "ark-*"

  # Go module (gnark, gnark-crypto, ...).
  - package-ecosystem: gomod
    directory: /zkwrap-gnark
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  # Action versions pinned in .github/workflows/*.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
